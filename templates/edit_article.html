<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="navbar">
        <h1>🏆 Sports News</h1>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>

    <main>
        <div class="form-box">
            <h2>Edit Article</h2>
            <form method="POST">
                <label>Title</label>
                <input type="text" name="title" value="{{ article.title }}" required>

                <label>Category</label>
                <input type="text" name="category" value="{{ article.category }}" required>

                <label>Author</label>
                <input type="text" name="author" value="{{ article.author }}" required>

                <label>Content</label>
                <textarea name="content" rows="5" required>{{ article.content }}</textarea>

                <button type="submit">Update Article</button>
            </form>
        </div>
    </main>
</body>
</html>
