<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Edit Article</h1>
    </header>

    <main>
        <form method="POST">
            <label>Title</label><br>
            <input type="text" name="title" value="{{ article.title }}" required><br><br>

            <label>Category</label><br>
            <input type="text" name="category" value="{{ article.category }}" required><br><br>

            <label>Author</label><br>
            <input type="text" name="author" value="{{ article.author }}" required><br><br>

            <label>Content</label><br>
            <textarea name="content" rows="5" required>{{ article.content }}</textarea><br><br>

            <button type="submit">Update Article</button>
        </form>
    </main>
</body>
</html>
