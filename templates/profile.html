<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="navbar">
        <h1>🏆 Sports News</h1>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>

    <main>
        <div class="form-box">
            <h2>My Profile</h2>

            {% if error %}
            <p style="color: red; margin-bottom: 1rem;">{{ error }}</p>
            {% endif %}

            {% if success %}
            <p style="color: green; margin-bottom: 1rem;">{{ success }}</p>
            {% endif %}

            <form method="POST">
                <label>Username</label>
                <input type="text" name="username" value="{{ current_user.username }}">

                <label>New Password (leave blank to keep current)</label>
                <input type="password" name="password">

                <button type="submit">Update Profile</button>
            </form>

            <br>
            <a href="{{ url_for('delete_account') }}" style="color: red;" onclick="return confirm('Are you sure you want to delete your account?')">Delete My Account</a>
        </div>
    </main>
</body>
</html>
